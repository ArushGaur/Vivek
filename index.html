<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.I.V.E.K</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BOOT OVERLAY -->
<div id="boot-overlay">
  <div id="boot-logo">V.I.V.E.K</div>
  <div id="boot-sub">NEURAL CORE INITIALIZING</div>
  <div id="boot-lines">
    <div class="bl" id="bl1">▸ QUANTUM MATRIX ONLINE</div>
    <div class="bl" id="bl2">▸ GEMINI LIVE PROTOCOL LOADED</div>
    <div class="bl" id="bl3">▸ VOICE ENGINE CALIBRATED</div>
    <div class="bl" id="bl4">▸ PERSONALITY CORES READY</div>
    <div class="bl" id="bl5">▸ SPHERE PARTICLES ARMED</div>
  </div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
  <div id="boot-pct">0%</div>
</div>

<!-- FULL-SCREEN SPHERE CANVAS -->
<canvas id="orb-canvas"></canvas>

<!-- VIVEK LABEL -->
<div id="jarvis-label">V.I.V.E.K</div>

<!-- STATE LABEL -->
<div id="state-label">IDLE</div>

<!-- TRANSCRIPT -->
<div id="transcript-box">
  <span id="transcript-text">Initializing voice detection…</span>
</div>

<!-- STOP BUTTON -->
<button id="stop-btn" onclick="stopSpeaking()">■ STOP</button>

<!-- API KEY PANEL -->
<div id="api-panel">
  <div id="api-toggle" onclick="toggleApiPanel()">⚙ API KEY</div>
  <div id="api-body">
    <input type="password" id="api-input" placeholder="AIzaSy-xxxxxxxxxxxx" autocomplete="off">
    <button id="api-save" onclick="saveApiKey()">CONNECT</button>
    <div id="api-status"></div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
